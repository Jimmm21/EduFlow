services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eduflow}
      POSTGRES_USER: ${POSTGRES_USER:-eduflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eduflow_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eduflow} -d ${POSTGRES_DB:-eduflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://eduflow:eduflow_dev_password@postgres:5432/eduflow}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001}
      CORS_ORIGIN_REGEX: ${CORS_ORIGIN_REGEX:-https?://(localhost|127\\.0\\.0\\.1)(:\\d+)?}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-20}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      GMAIL_CLIENT_ID: ${GMAIL_CLIENT_ID:-}
      GMAIL_CLIENT_SECRET: ${GMAIL_CLIENT_SECRET:-}
      GMAIL_REFRESH_TOKEN: ${GMAIL_REFRESH_TOKEN:-}
      GMAIL_SENDER_EMAIL: ${GMAIL_SENDER_EMAIL:-}
      GMAIL_SENDER_NAME: ${GMAIL_SENDER_NAME:-EduFlow}
      GMAIL_TIMEOUT_SECONDS: ${GMAIL_TIMEOUT_SECONDS:-20}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_PUBLIC_BASE_URL: ${R2_PUBLIC_BASE_URL:-}
      R2_REGION: ${R2_REGION:-auto}
    ports:
      - "8001:8001"
    volumes:
      - backend_uploads:/app/backend/uploads
    depends_on:
      postgres:
        condition: service_healthy

  eduflow:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "3000:80"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

volumes:
  postgres_data:
  backend_uploads:
